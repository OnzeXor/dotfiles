# ============================
#       OXOCARBON THEME
# ============================

# Paleta (Oxocarbon)
$bg        = rgba(18, 18, 18, 0.90)      # Fundo
$bg_low    = rgba(32, 32, 32, 0.85)      # Painéis / caixas
$fg        = rgba(225, 225, 225, 1.0)    # Texto principal
$accent    = rgba(200, 200, 200, 1.0)     # Azul-ciano Oxocarbon
$accent_dim= rgba(80, 200, 255, 0.3)

# ============================
#     BACKGROUND
# ============================
background {
    monitor =
    path = ~/.config/wallpapers/oxocarbon.jpg  # Troque para seu wallpaper
    blur_passes = 3
    blur_size = 6
    noise = 0.02
    brightness = 0.9
}

# ============================
#     INPUT FIELD (senha)
# ============================
input-field {
    monitor =
    size = 330, 60
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.27
    fade_on_empty = false

    outer_color = $accent
    inner_color = $bg_low
    font_color  = $fg
    placeholder_text = 
    fail_color = rgba(255, 80, 80, 1.0)
    fail_text  = !

    position = 0, 0
    halign = center
    valign = center
}

