
general {
    lock_cmd = pidof hyprlock || hyprlock
    unlock_cmd = pkill -USR1 hyprlock
    ignore_dbus_inhibit = false
}

# 3 minutos antes de ficar idle (antes do lock em 600s)
listener {
    timeout = 420  # 7 min (600 - 180)

    on-timeout = bash -c '
      # Detecta se está na tomada (qualquer power_supply com "online=1")
      on_ac=0; for f in /sys/class/power_supply/*/online; do [ -f "$f" ] && [ "$(cat "$f")" = "1" ] && on_ac=1; done

      # Salva brilho atual (uma vez) pra restaurar depois
      [ -f /tmp/hypridle_brightness_saved ] || brightnessctl -m | cut -d, -f4 > /tmp/hypridle_brightness_saved

      # Pausa mídia (se existir player rodando)
      command -v playerctl >/dev/null 2>&1 && playerctl pause 2>/dev/null || true

      # Diminui brilho: na tomada fica mais escuro, na bateria menos agressivo
      if [ "$on_ac" = "1" ]; then
        brightnessctl set 15% >/dev/null
      else
        brightnessctl set 30% >/dev/null
      fi
    '

    on-resume = bash -c '
      # Restaura brilho salvo
      if [ -f /tmp/hypridle_brightness_saved ]; then
        b="$(cat /tmp/hypridle_brightness_saved)"
        brightnessctl set "$b" >/dev/null 2>&1 || true
        rm -f /tmp/hypridle_brightness_saved
      fi
    '
}

# Lock em 10 min (600s) — na tomada deixa ainda mais escuro e bloqueia
listener {
    timeout = 600

    on-timeout = bash -c '
      on_ac=0; for f in /sys/class/power_supply/*/online; do [ -f "$f" ] && [ "$(cat "$f")" = "1" ] && on_ac=1; done
      [ "$on_ac" = "1" ] && brightnessctl set 10% >/dev/null
      pidof hyprlock >/dev/null || hyprlock
    '
}

# Suspend só na bateria em 20 min (1200s)
listener {
    timeout = 1200
    on-timeout = bash -c '
      on_ac=0; for f in /sys/class/power_supply/*/online; do [ -f "$f" ] && [ "$(cat "$f")" = "1" ] && on_ac=1; done
      [ "$on_ac" = "0" ] && systemctl suspend
    '
}

