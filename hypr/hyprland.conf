

# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

################
### MONITORS ###
################

monitor = HDMI-A-2,2560x1080@60,1920x0,1
monitor = eDP-1,1920x1080@144,0x0,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = yazi
$menu = pkill ulauncher && ulauncher &

#################
### AUTOSTART ###
#################

exec-once = waybar & hyprpaper & hypridle & systemctl --user start vicinae

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_FONT_DPI,96
env = QT_QPA_PLATFORMTHEME,qt6ct

#####################
### LOOK AND FEEL ###
#####################

xwayland {
  force_zero_scaling = true
}

general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2

  col.active_border = rgba(ffffff73)
  col.inactive_border = rgba(595959aa)

  resize_on_border = false
  allow_tearing = false
  layout = dwindle
}

###################
### WINDOW RULES ###
###################

windowrule {
  name = wifitui-bluetui-imv-float
  match:class = ^(wifitui-popup|bluetui-popup|imv)$
  float = true
  rounding = 6
}

windowrule {
  name = wifitui-bluetui-size
  match:class = ^(wifitui-popup|bluetui-popup)$
  size = 35% 70%
}

windowrule {
  name = imv-size-pin-move
  match:class = ^(imv)$
  size = 160 160
  pin = true
  move = 380 55
}

windowrule {
  name = calendar-popup
  match:class = ^(cal-popup)$
  float = true
  center = true
  size = 300 260
  border_size = 0
}

windowrule {
  name = ignore-maximize
  match:class = .*
  suppress_event = maximize
}

windowrule {
  name = xwayland-drag-fix
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false
  no_focus = true
}

#################
### DECORATION ###
#################

decoration {
  rounding = 6
  active_opacity = 1.0
  inactive_opacity = 1.0

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 1
    vibrancy = 0.1696
  }
}

################
### ANIMATION ###
################

animations {
  enabled = true

  bezier = easeOutQuint,0.23,1,0.32,1
  bezier = easeInOutCubic,0.65,0.05,0.36,1
  bezier = linear,0,0,1,1
  bezier = almostLinear,0.5,0.5,0.75,1.0
  bezier = quick,0.15,0,0.1,1

  animation = global,1,10,default
  animation = border,1,5.39,easeOutQuint
  animation = windows,1,4.79,easeOutQuint
  animation = windowsIn,1,4.1,easeOutQuint,popin 87%
  animation = windowsOut,1,1.49,linear,popin 87%
  animation = fadeIn,1,1.73,almostLinear
  animation = fadeOut,1,1.46,almostLinear
  animation = fade,1,3.03,quick
  animation = layers,1,3.81,easeOutQuint
  animation = layersIn,1,4,easeOutQuint,fade
  animation = layersOut,1,1.5,linear,fade
  animation = fadeLayersIn,1,1.79,almostLinear
  animation = fadeLayersOut,1,1.39,almostLinear
  animation = workspaces,1,1.94,almostLinear,fade
  animation = workspacesIn,1,1.21,almostLinear,fade
  animation = workspacesOut,1,1.94,almostLinear,fade
}

#############
### INPUT ###
#############

input {
  kb_layout = us
  kb_variant = intl
  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = false
  }
}

device {
  name = pixa3848:00-093a:3848-touchpad
  natural_scroll = true
}

device {
  name = epic-mouse-v1
  sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, SPACE, exec, vicinae open
bind = $mainMod, TAB, exec, rofi -show window -theme oxocarbon -show-icons

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod, M, resizeactive, 0 40
bind = $mainMod SHIFT, M, resizeactive, 0 -40
bind = $mainMod, N, resizeactive, 40 0
bind = $mainMod SHIFT, N, resizeactive, -40 0

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, X, togglespecialworkspace, magic
bind = $mainMod SHIFT, X, movetoworkspace, special:magic

bind = $mainMod, S, exec, hyprshot -m window
bind = $mainMod SHIFT, S, exec, hyprshot -m region

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

