# Use fish as default
set -g default-shell /bin/fish

# Enable 256-color and true-color (24-bit) support in tmux
set -g default-terminal "screen-256color" # Set terminal type for 256-color support
set -ga terminal-overrides ",*256col*:Tc" # Override to enable true-color for compatible terminals

# General
set -g set-clipboard on         # Use system clipboard
set -g detach-on-destroy off    # Don't exit from tmux when closing a session
set -g escape-time 0            # Remove delay for exiting insert mode with ESC in Neovim
set -g history-limit 1000000    # Increase history size (from 2,000)
set -g mouse off                # Sem mouse: fluxo 100% teclado
set -g status-interval 3        # Update the status bar every 3 seconds (default: 15 seconds)
set -g allow-passthrough on     # Allow programs in the pane to bypass tmux (e.g. for image preview)
set -g status-position bottom

# Set prefix key
unbind C-b              # Unbind the default prefix key
set -g prefix C-Space   # Set new prefix key to Ctrl+Space

# Prefix = Ctrl+Space. Binds inspirados no Hyprland:
# q/Q fecha, h/j/k/l navega, H/J/K/L move, r renomeia, R recarrega.
unbind r
bind r command-prompt -I "#W" "rename-window '%%'"       # Renomear aba/window
bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf recarregado"

# Fechar como no Hyprland ($mainMod + Q)
bind q kill-pane                                      # Fecha painel atual
bind Q confirm-before -p "Fechar aba #W? (y/n)" kill-window

# Split horizontally in CWD with \
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# Split vertically in CWD with -
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Navegação estilo Hyprland/vim: Prefix + h/j/k/l muda foco entre painéis
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Mover painel atual como Hyprland SHIFT + h/j/k/l
bind -r H swap-pane -t '{left-of}'
bind -r J swap-pane -t '{down-of}'
bind -r K swap-pane -t '{up-of}'
bind -r L swap-pane -t '{right-of}'

# Redimensionar: Prefix + Ctrl+h/j/k/l
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Maximizar/restaurar painel
bind m resize-pane -Z

# Enable vi mode to allow us to use vim keys to move around in copy mode (Prefix + [ places us in copy mode)
set-window-option -g mode-keys vi

# Start selecting text with "v"
bind-key -T copy-mode-vi 'v' send -X begin-selection 

# Copy text with "y" (Wayland/Hyprland)
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "wl-copy"

# Paste yanked text with "Prefix + P" ("Prefix + p" goes to previous window)
bind P paste-buffer

# Abas/windows como workspaces do Hyprland
bind -r n next-window
bind -r p previous-window
bind -r Tab last-window

# Mover/reordenar abas
bind -r S-Left swap-window -t -1 \; previous-window
bind -r S-Right swap-window -t +1 \; next-window
bind -r '<' swap-window -t -1 \; previous-window
bind -r '>' swap-window -t +1 \; next-window
 
# Mouse desligado; manter sem binds de drag

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on # Automatically renumber windows when one is closed

# tpm plugin manager
set -g @plugin 'tmux-plugins/tpm'

# List of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # Enable navigating between nvim and tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'    # Automatically saves sessions every 15 minutes
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor' # CPU and memory info

# Style
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

set -g status-position top
set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=default"
set -g status-left "#[fg=${green_soft},bold] #S #[fg=${gray_light},nobold] | "
set -g status-right "#[fg=${blue_muted}]󰥔 %H:%M #[fg=${gray_medium}]%d/%m  #[fg=${gray_light}] #{cpu}   #{mem}  󱛟 #{disk -f}  󱊣 #{battery} "
# set -g status-right " #{cpu}   #{mem} "
set -g window-status-current-format "#[fg=${cyan_soft},bold]  #[underscore]#I:#W#[nounderscore]#{?window_zoomed_flag, 󰍋 ,}"
set -g window-status-format " #I:#W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${green_soft}"

# Resurrect
set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
